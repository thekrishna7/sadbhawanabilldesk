<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline | Sadbhawana BillDesk</title>
  <style>
    :root {
      --bg-color: #0d1b2a;
      --card-bg: #1b263b;
      --text-primary: #e0e1dd;
      --text-muted: #a3a8b4;
      --royal-blue: #1e3a8a;
      --premium-gold: #d4af37;
      --premium-gold-hover: #b8972f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Background decorative circles */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.15;
    }

    .circle-1 {
      width: 300px;
      height: 300px;
      background: var(--royal-blue);
      top: -50px;
      left: -50px;
    }

    .circle-2 {
      width: 250px;
      height: 250px;
      background: var(--premium-gold);
      bottom: -50px;
      right: -50px;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 400px;
      padding: 40px 30px;
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-container {
      margin-bottom: 25px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.4), rgba(13, 27, 42, 0.4));
      border: 2px solid var(--premium-gold);
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      color: var(--premium-gold);
      animation: pulse 2s infinite ease-in-out;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #b8c1ec 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 30px;
      padding: 0 10px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 600;
      color: #0d1b2a;
      background: linear-gradient(135deg, var(--premium-gold) 0%, #f3e5ab 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      transition: all 0.2s ease-in-out;
      outline: none;
    }

    .retry-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
      background: var(--premium-gold-hover);
    }

    .retry-btn svg {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      transition: transform 0.4s ease;
    }

    .retry-btn:active svg {
      transform: rotate(180deg);
    }

    .offline-badge {
      display: inline-block;
      margin-top: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--premium-gold);
      background: rgba(212, 175, 55, 0.1);
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }
  </style>
</head>
<body>
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="container">
    <div class="logo-container">
      <!-- Wi-Fi off SVG icon in premium gold -->
      <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 5 5 0 011.414-3.536m0 0L5.636 5.636M12 12a1 1 0 100 2 1 1 0 000-2z" />
      </svg>
    </div>
    
    <h1>No Connection</h1>
    <p>Please check your internet settings. Sadbhawana BillDesk requires an active connection to access your dashboard.</p>
    
    <button class="retry-btn" onclick="retryConnection()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2" />
      </svg>
      Try Again
    </button>

    <div>
      <span class="offline-badge">Connection Error</span>
    </div>
  </div>

  <script>
    function retryConnection() {
      // Direct redirection to the live Vercel website
      window.location.href = 'https://sadbhawanabilldesk.vercel.app';
    }

    // Disable standard web browser pull-to-refresh behavior
    window.addEventListener('load', function() {
      document.body.addEventListener('touchmove', function(e) {
        if (e.touches[0].pageY > 0) {
          // Prevent double tap / pull gestures
          if (document.body.scrollTop === 0) {
            // Can be configured if needed
          }
        }
      }, { passive: false });
    });
  </script>
</body>
</html>
